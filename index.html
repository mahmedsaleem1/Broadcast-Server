<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broadcast Server Client</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-glow: 0px 0px 20px rgba(99, 102, 241, 0.4);
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 650px;
            height: 85vh;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), var(--accent-glow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header Styling */
        .header {
            padding: 24px;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title-area h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 99px;
            border: 1px solid var(--card-border);
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--warning);
            box-shadow: 0 0 8px var(--warning);
            transition: all 0.3s ease;
        }

        .status-dot.connected {
            background-color: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        .status-dot.disconnected {
            background-color: var(--danger);
            box-shadow: 0 0 10px var(--danger);
        }

        /* Chat Messages Area */
        .chat-area {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar */
        .chat-area::-webkit-scrollbar {
            width: 6px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 99px;
        }

        .chat-area::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .message-bubble {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 0.95rem;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            word-wrap: break-word;
        }

        @keyframes popIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .message-received {
            background: rgba(255, 255, 255, 0.06);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .message-system {
            background: rgba(245, 158, 11, 0.1);
            color: #fcd34d;
            align-self: center;
            font-size: 0.8rem;
            font-weight: 500;
            border-radius: 99px;
            padding: 6px 16px;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        /* Message input form */
        .input-form {
            padding: 24px;
            border-top: 1px solid var(--card-border);
            display: flex;
            gap: 12px;
            background: rgba(15, 23, 42, 0.4);
        }

        .input-form input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            padding: 14px 20px;
            border-radius: 14px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-form input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .input-form button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 14px;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-form button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .input-form button:active {
            transform: translateY(1px);
        }

        .input-form button:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="title-area">
                <h1>Broadcast Room</h1>
                <div class="subtitle">Real-time WebSocket Pub/Sub Server</div>
            </div>
            <div class="status-badge">
                <span id="status-dot" class="status-dot disconnected"></span>
                <span id="status-text">Disconnected</span>
            </div>
        </div>

        <!-- Chat Area -->
        <div id="chat-area" class="chat-area">
            <div class="message-bubble message-system">Welcome! Start the server and connect.</div>
        </div>

        <!-- Input Form -->
        <form id="input-form" class="input-form">
            <input type="text" id="message-input" placeholder="Type your message here..." autocomplete="off" required
                disabled>
            <button type="submit" id="send-button" disabled>Send</button>
        </form>
    </div>

    <script>
        const chatArea = document.getElementById('chat-area');
        const inputForm = document.getElementById('input-form');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        let ws;

        function connect() {
            setStatus('connecting', 'Connecting...');

            // Connect to server running on localhost:3000
            ws = new WebSocket('ws://localhost:3000');

            ws.onopen = () => {
                setStatus('connected', 'Connected');
                messageInput.disabled = false;
                sendButton.disabled = false;
                addSystemMessage('Connected to the broadcast server!');
            };

            ws.onmessage = (event) => {
                // Since this is a broadcast server, any message received is appended
                addReceivedMessage(event.data);
            };

            ws.onclose = () => {
                setStatus('disconnected', 'Disconnected');
                messageInput.disabled = true;
                sendButton.disabled = true;
                addSystemMessage('Disconnected from server. Retrying in 3 seconds...');
                setTimeout(connect, 3000);
            };

            ws.onerror = (err) => {
                console.error('WebSocket Error:', err);
                ws.close();
            };
        }

        function setStatus(status, text) {
            statusDot.className = 'status-dot ' + status;
            statusText.textContent = text;
        }

        function addSystemMessage(text) {
            const el = document.createElement('div');
            el.className = 'message-bubble message-system';
            el.textContent = text;
            chatArea.appendChild(el);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function addReceivedMessage(text) {
            const el = document.createElement('div');
            el.className = 'message-bubble message-received';
            el.textContent = text;
            chatArea.appendChild(el);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        inputForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const message = messageInput.value.trim();
            if (message && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(message);
                messageInput.value = '';
            }
        });

        // Initialize connection
        connect();
    </script>
</body>

</html>
